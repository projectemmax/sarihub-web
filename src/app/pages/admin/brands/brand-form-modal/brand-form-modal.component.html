<div
    *ngIf="visible"
    class="modal fade show d-block">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    {{ title }}
                </h5>

                <button
                    type="button"
                    class="btn-close"
                    (click)="close.emit()">
                </button>

            </div>

            <div class="modal-body">

                <form [formGroup]="form">

                    <!-- Name -->

                    <div class="mb-3">

                        <label class="form-label">
                            Brand Name
                        </label>

                        <input
                            class="form-control"
                            formControlName="name">

                        <div
                            class="text-danger mt-1"
                            *ngIf="
                                form.get('name')?.invalid &&
                                form.get('name')?.touched
                            ">

                            Brand name is required

                        </div>

                    </div>

                    <!-- Description -->

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <textarea
                            rows="4"
                            class="form-control"
                            formControlName="description">
                        </textarea>

                    </div>

                    <!-- Logo -->

                    <div class="mb-3">

                        <label class="form-label">
                            Logo URL
                        </label>

                        <input
                            class="form-control"
                            formControlName="logoUrl">

                    </div>

                    <!-- Preview -->

                    <div
                        *ngIf="form.get('logoUrl')?.value"
                        class="mb-3">

                        <img
                            [src]="form.get('logoUrl')?.value"
                            class="brand-logo-preview">

                    </div>

                    <!-- Flags -->

                    <div class="form-check mb-2">

                        <input
                            type="checkbox"
                            class="form-check-input"
                            formControlName="isVerified">

                        <label class="form-check-label">
                            Verified Brand
                        </label>

                    </div>

                    <div class="form-check">

                        <input
                            type="checkbox"
                            class="form-check-input"
                            formControlName="isActive">

                        <label class="form-check-label">
                            Active
                        </label>

                    </div>

                </form>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-light"
                    (click)="close.emit()">

                    Cancel

                </button>

                <button
                    class="btn btn-primary"
                    [disabled]="submitting"
                    (click)="save.emit()">
                    <span
                        *ngIf="submitting"
                        class="spinner-border spinner-border-sm me-2">
                    </span>
                    Save

                </button>

            </div>

        </div>

    </div>

</div>

<div
    *ngIf="visible"
    class="modal-backdrop fade show">
</div>
