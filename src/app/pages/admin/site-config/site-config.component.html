<div class="card">
    <div class="card-body">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h4 class="card-title mb-0">Site Configuration</h4>
                <small class="text-muted">Manage global system settings</small>
            </div>
        </div>
        
        <app-dynamic-form
            [schema]="schema"
            [data]="configs"
            [loading]="isSaving"
            (submitted)="save($event)">
        </app-dynamic-form>
      
    </div>
</div>
