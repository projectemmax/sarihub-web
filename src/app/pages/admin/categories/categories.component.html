<div class="row">

  <!-- ===== MAIN LIST ===== -->
  <div [ngClass]="isSidePanelVisible ? 'col-8' : 'col-12'">

    <div class="card">

      <!-- ================= HEADER ================= -->
      <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">Categories</h5>

        <div class="d-flex gap-2 align-items-center">

          <app-search
            placeholder="Search category"
            (search)="onSearch($event)">
          </app-search>

          <!-- STATUS FILTER -->
          <select
            class="form-select form-select-sm"
            style="width: 150px"
            (change)="onStatusFilterChange($any($event.target).value)">
            <option value="ALL">All</option>
            <option value="ACTIVE">Active</option>
            <option value="INACTIVE">Inactive</option>
          </select>

          <button
            class="btn btn-sm btn-success"
            (click)="openSidePanel()">
            New Category
          </button>

        </div>

      </div>

      <!-- ================= BODY ================= -->
      <div class="card-body">

        <!-- LOADER -->
        <div *ngIf="isLoading" class="text-center my-3">
          <div class="spinner-border text-primary"></div>
        </div>

        <!-- TABLE -->
        <table
          class="table table-striped table-hover"
          *ngIf="!isLoading">

          <thead>
            <tr>
              <th>Name</th>
              <th>Status</th>
              <th width="120">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let cat of pagedCategories$ | async">
              <td>{{ cat.name }}</td>
              <td>{{ cat.isActive ? 'Active' : 'Inactive' }}</td>
              <td>
                <button
                  class="btn btn-primary btn-sm"
                  (click)="onEdit(cat)">
                  Edit
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <!-- EMPTY -->
        <div
          class="text-center text-muted py-3"
          *ngIf="!(pagedCategories$ | async)?.length && !isLoading">
          No categories found.
        </div>

        <!-- PAGINATION -->
        <ng-container *ngIf="totalPages$ | async as totalPages">
          <app-pagination
            *ngIf="totalPages > 1"
            [currentPage]="currentPage"
            [totalPages]="totalPages"
            (pageChange)="changePage($event)">
          </app-pagination>
        </ng-container>

      </div>
    </div>
  </div>

  <!-- ===== SIDE PANEL (CATEGORY FORM) ===== -->
  <div class="col-4" *ngIf="isSidePanelVisible">

    <div class="card h-100">

      <!-- PANEL HEADER -->
      <div class="card-header bg-light d-flex justify-content-between align-items-center">
        <span class="fw-bold">
          {{ isEditMode ? 'Edit Category' : 'New Category' }}
        </span>

        <button
          class="btn btn-sm btn-outline-secondary"
          (click)="closeSidePanel()">
          Close
        </button>
      </div>

      <!-- PANEL BODY -->
      <div class="card-body">

        <form [formGroup]="categoryForm">
            <div class="row">
                <!-- NAME -->
                <div class="form-group">
                    <label>Category Name</label>
                    <input
                    type="text"
                    class="form-control"
                    formControlName="name"
                    placeholder="e.g. Accessories">
                </div>

                <!-- ACTIVE -->
                <div class="form-group">
                    <label class="m-0">Status:</label>

                    <div class="form-check form-switch">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            formControlName="isActive"
                            id="isActiveToggle">

                        <label class="form-check-label" for="isActiveToggle">
                            {{ categoryForm.value.isActive ? 'Active' : 'Inactive' }}
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Variant Template</label>
                    <div *ngFor="let field of variantTemplate; let i = index; trackBy: trackByIndex"
                        class="d-flex mb-2">

                        <input [(ngModel)]="variantTemplate[i]"
                            [ngModelOptions]="{ standalone: true }"
                            name="variant-{{i}}"
                            class="form-control me-2"
                            placeholder="e.g. Size">

                        <button class="btn btn-danger"
                                (click)="removeTemplateField(i)">
                        ✕
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <button class="btn btn-sm btn-outline-primary"
                            (click)="addTemplateField()">
                        + Add Field
                    </button>
                </div>
            </div>
            
        </form>

        <!-- ACTIONS -->
        <div class="d-flex gap-2">
          <button
            class="btn btn-primary"
            *ngIf="!isEditMode"
            (click)="onSaveCategory()">
            Create Category
          </button>

          <button
            class="btn btn-success"
            *ngIf="isEditMode"
            (click)="onSaveCategory()">
            Update Category
          </button>
        </div>

      </div>
    </div>
  </div>

</div>
