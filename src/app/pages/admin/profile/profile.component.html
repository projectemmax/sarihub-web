<div class="row">
    <div class="col-12 grid-margin">
      <div class="card">
        <div class="card-body">

          <div *ngIf="loading" class="text-center py-5">
            <div class="spinner-border text-primary"></div>
          </div>

          <form
            *ngIf="!loading"
            [formGroup]="profileForm"
            (ngSubmit)="saveProfile()">

            <div class="row g-4">

              <!-- LEFT SIDE -->
              <div class="col-lg-4 border-end-lg text-center">
                <div class="avatar-wrapper mx-auto mb-3">
                  <img
                    [src]="avatarPreview || 'assets/admin/images/faces/face8.jpg'"
                    class="profile-avatar"
                    alt="avatar"
                  />
                </div>

                <label class="btn btn-outline-primary rounded-pill px-4">
                  <i class="typcn typcn-camera-outline me-2"></i>
                  {{ uploadingAvatar ? 'Uploading...' : 'Upload Avatar' }}

                  <input
                    type="file"
                    hidden
                    accept="image/*"
                    (change)="onAvatarSelected($event)"
                  />
                </label>

                <div class="mt-3">
                  <span class="badge role-badge">
                    {{ role }}
                  </span>
                </div>
              </div>

              <!-- RIGHT SIDE -->
              <div class="col-lg-8">

                <div class="row g-3">
                    <div class="col-md-6 form-group">
                        <label>First Name</label>
                        <input
                        type="text"
                        class="form-control"
                        formControlName="firstName"
                        />
                    </div>

                    <div class="col-md-6 form-group">
                        <label>Last Name</label>
                        <input
                            type="text"
                            class="form-control"
                            formControlName="lastName"
                        />
                    </div>

                    <div class="col-12 form-group">
                        <label>Email</label>
                        <input
                            type="email"
                            class="form-control bg-light"
                            formControlName="email"
                            readonly
                        />
                    </div>

                    <div class="col-12 form-group">
                        <label>Mobile Number</label>
                        <input
                            type="text"
                            class="form-control"
                            formControlName="mobileNumber"
                            placeholder="09XXXXXXXXX"
                        />
                    </div>
                </div>

                <hr class="my-4" />

                <div class="d-flex justify-content-between align-items-center mb-4">
                  <h5 class="mb-0 card-title">Change Password</h5>
                  <span class="text-muted small">Optional</span>
                </div>

                <div class="row g-3">
                    <div class="col-12 form-group">
                        <label >Current Password</label>
                        <input
                            type="password"
                            class="form-control"
                            formControlName="currentPassword"
                        />
                    </div>

                    <div class="col-md-6 form-group">
                        <label>New Password</label>
                        <input
                            type="password"
                            class="form-control"
                            formControlName="newPassword"
                            (input)="checkPasswordMatch()"
                        />
                    </div>

                    <div class="col-md-6 form-group">
                        <label>Confirm Password</label>
                        <input
                            type="password"
                            class="form-control"
                            formControlName="confirmPassword"
                            (input)="checkPasswordMatch()"
                        />

                        <div
                            class="text-danger small mt-1"
                            *ngIf="
                                profileForm.get('confirmPassword')?.hasError('mismatch') &&
                                profileForm.get('confirmPassword')?.touched
                            "
                            >
                            Passwords do not match
                        </div>
                    </div>
                </div>

                <div class="mt-4 text-end">
                  <button
                    type="submit"
                    class="btn btn-primary px-4 rounded-pill"
                    [disabled]="saving">

                    <span
                      *ngIf="saving"
                      class="spinner-border spinner-border-sm me-2">
                    </span>

                    Save Profile
                  </button>
                </div>

              </div>
            </div>
          </form>

        </div>
      </div>
    </div>
</div>
