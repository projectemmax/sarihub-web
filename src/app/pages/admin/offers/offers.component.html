<div class="card">

  <div class="card-header d-flex justify-content-between align-items-center">
    <h5 class="mb-0">Offers</h5>

    <div class="d-flex gap-2">
        <button
            class="btn btn-sm btn-outline-warning"
            [disabled]="!hasUiEdits()"
            (click)="resetUiEdits()">
            Reset UI Edits
        </button>
        <button
        class="btn btn-sm btn-success"
        (click)="openOfferModal()">
        New Offer
        </button>
    </div>
  </div>

  <div class="card-body">

    <!-- Loader -->
    <div *ngIf="isLoading" class="text-center my-3">
      <div class="spinner-border text-primary"></div>
    </div>

    <!-- Offers Grid -->
    <div class="row" *ngIf="!isLoading">

      <div
        class="col-3 mb-3"
        *ngFor="let offer of pagedOffers$ | async">

        <div class="card h-100">

          <img
            [src]="offer.offerImageUrl"
            class="card-img-top"
            alt="Offer">

          <div class="card-body">
            <div class="d-flex justify-content-between align-items-center mb-1">
                <h6 class="mb-0">{{ offer.offerName }}</h6>

                <span
                    *ngIf="isEdited(offer.offerId)"
                    class="badge bg-warning text-dark">
                    Edited
                </span>
            </div>

            <p class="mb-1">
              Discount: {{ offer.offerPercentDiscount }}%
            </p>

            <div class="form-check form-switch mt-2">
                <input
                    class="form-check-input"
                    type="checkbox"
                    [checked]="offer.isActive"
                    [disabled]="isLoading"
                    (change)="onToggleActive(offer)">

                <label class="form-check-label">
                    {{ offer.isActive ? 'Active' : 'Inactive' }}
                </label>
            </div>


            <div class="mt-2 d-flex gap-2">
                <button
                    class="btn btn-primary btn-sm"
                    (click)="onEditOffer(offer)">
                    Edit
                </button>

                <button
                    class="btn btn-danger btn-sm"
                    (click)="onDelete(offer)">
                    Delete
                </button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <!-- Pagination -->
    <ng-container *ngIf="totalPages$ | async as totalPages">
      <app-pagination
        *ngIf="totalPages > 1"
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="changePage($event)">
      </app-pagination>
    </ng-container>

  </div>
</div>
<!-- ================= CREATE OFFER MODAL ================= -->
<div
  class="modal fade"
  [class.show]="isOfferModalVisible"
  [style.display]="isOfferModalVisible ? 'block' : 'none'"
  style="background-color: rgba(0,0,0,0.5)">

  <div class="modal-dialog">
    <div class="modal-content">

      <!-- HEADER -->
      <div class="modal-header">
        <h5 class="modal-title">
            {{ isEditMode ? 'Edit Offer' : 'New Offer' }}
        </h5>

        <button
          type="button"
          class="btn-close"
          (click)="closeOfferModal()">
        </button>
      </div>

      <!-- BODY -->
      <div class="modal-body">

        <input
          type="text"
          class="form-control mb-3"
          placeholder="Offer Name"
          [(ngModel)]="offerObj.offerName"
          required>

        <input
          type="text"
          class="form-control mb-3"
          placeholder="Image URL"
          [(ngModel)]="offerObj.offerImageUrl">

        <input
          type="number"
          class="form-control mb-3"
          placeholder="Discount (%)"
          [(ngModel)]="offerObj.offerPercentDiscount"
          min="0"
          max="100">

        <div class="form-check">
          <input
            type="checkbox"
            class="form-check-input"
            [(ngModel)]="offerObj.isActive"
            id="isActive">
          <label class="form-check-label" for="isActive">
            Active
          </label>
        </div>

      </div>

      <!-- FOOTER -->
      <div class="modal-footer">
        <button
          class="btn btn-secondary"
          (click)="closeOfferModal()">
          Cancel
        </button>

        <button
            class="btn btn-primary"
            [disabled]="isLoading"
            (click)="onSaveOffer()">
            {{ isEditMode ? 'Update' : 'Save' }}
        </button>

      </div>

    </div>
  </div>
</div>
