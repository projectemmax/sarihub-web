<h4 class="fw-bold mb-4">My Addresses</h4>

<div class="d-flex justify-content-end mb-4">
  <button class="btn btn-primary" (click)="openAddModal()">
    + Add New Address
  </button>
</div>

<div *ngFor="let address of addresses" class="card p-4 mb-3">
    <div class="d-flex justify-content-between align-items-start">
        <div>
            <div class="mb-2">
                <i class="far fa-user me-2"></i><strong>{{ address.name }}</strong>
                <span class="text-muted d-block"><i class="fa fa-mobile-alt me-2"></i>{{ address.phone }}</span>
            </div>

            <div class="text-muted">
                <i class="fas fa-map-marker-alt me-2"></i>{{ address.address }}, {{ address.barangay }}, {{ address.city }}, {{ address.province }}
            </div>
        </div>

        <span *ngIf="address.isDefault" class="badge bg-success">
            Default
        </span>
    </div>

    <div class="mt-3">
        <button
            class="btn btn-outline-primary btn-sm me-2"
            (click)="editAddress(address)">
            Edit
        </button>

        <button
            class="btn btn-outline-danger btn-sm me-2"
            (click)="deleteAddress(address)"
            [disabled]="address.isDefault">
            Delete
        </button>

        <button
            *ngIf="!address.isDefault"
            class="btn btn-outline-success btn-sm"
            (click)="setDefault(address)">
            Set as Default
        </button>
    </div>
</div>

<div *ngIf="addresses.length === 0" class="text-center text-muted py-5">
    No saved addresses yet.
</div>

<div
    *ngIf="isModalLoading"
    class="modal-loading-backdrop">
    <div class="text-center">
        <div class="spinner-border text-primary mb-2"></div>
        <div>Loading address details...</div>
    </div>
</div>


<app-address-modal
    [visible]="showAddressModal"
    [editingAddress]="editingAddress"
    [regions]="regions"
    [provinces]="provinces"
    [cities]="cities"
    [barangays]="barangays"
    (close)="closeAddressModal()"
    (save)="saveAddress($event)"
    (regionChange)="onRegionChange($event)"
    (provinceChange)="onProvinceChange($event)"
    (cityChange)="onCityChange($event)"
>
</app-address-modal>
