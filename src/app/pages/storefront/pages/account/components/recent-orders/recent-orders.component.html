<div class="card p-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">Recent Orders</h5>
        <a routerLink="/storefront/orders"
            class="btn btn-sm btn-outline-primary">
            View All
        </a>
    </div>
    <div *ngIf="orders.length === 0" class="text-muted">
        No recent orders
    </div>
    <div *ngFor="let order of orders" class="order-row">
        <div class="order-row d-flex justify-content-between py-2 border-bottom">
            <div>
                <strong>#{{ order.id }}</strong>
                <div class="text-muted small">
                    {{ order.createdAt | date }}
                </div>
                <div class="text-muted small">
                    ₱ {{ order.totalAmount | number:'1.2-2' }}
                </div>
            </div>
            <span class="badge badge-status bg-warning">
                {{order.status}}
            </span>
        </div>
    </div>
</div>
