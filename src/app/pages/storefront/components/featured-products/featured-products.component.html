<div class="col-lg-12">
    <h4 class="mb-3">Featured products</h4>

    <ng-container *ngIf="products$ | async as products">
        <div
            *ngFor="let product of products"
            class="d-flex align-items-start mb-4"
            >
            <div 
                class="featured-image-wrapper
                me-3
                d-flex
                justify-content-center
                align-items-center">
                    <img
                    [src]="getProductImageUrl(product)"
                    class="img-fluid rounded featured-product-img"
                    alt="{{ product.name }}"
                    />
            </div>

            <div class="flex-grow-1">
                <h6 class="mb-2 featured-product-title">
                    <a
                        [routerLink]="['/storefront/product', product.slug]"
                        class="text-dark text-decoration-none"
                    >
                        {{ product.name }}
                    </a>
                </h6>

                <!-- Rating -->
                <div class="d-flex mb-2">
                    <app-rating></app-rating>
                </div>

                <!-- Price -->
                <div class="d-flex mb-2">
                    <h5 class="fw-bold me-2">
                        <ng-container *ngIf="getProductPriceSummary(product) as priceSummary">

                            <div class="d-flex mb-2">
                                <h6 class="fw-bold me-2">

                                    <ng-container *ngIf="priceSummary.hasPriceRange; else singlePrice">

                                        {{ priceSummary.minPrice | currency:'PHP' }}
                                        -
                                        {{ priceSummary.maxPrice | currency:'PHP' }}

                                    </ng-container>

                                    <ng-template #singlePrice>
                                        {{ priceSummary.minPrice | currency:'PHP' }}
                                    </ng-template>

                                </h6>
                            </div>

                        </ng-container>
                    </h5>
                </div>
            </div>
        </div>

        <!-- View More -->
        <div class="d-flex justify-content-center my-4">
            <a
                routerLink="/storefront/shop"
                [queryParams]="{ page: 1, featured: true }"
                class="btn border border-secondary px-4 py-3 rounded-pill text-primary w-100"
            >
                View More
            </a>
        </div>
    </ng-container>
</div>
