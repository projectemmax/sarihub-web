<div class="col-lg-12">
  <h4 class="mb-3">Featured products</h4>

  <ng-container *ngIf="products$ | async as products">
    <div
      *ngFor="let product of products"
      class="d-flex align-items-center justify-content-start mb-3"
    >
      <div class="rounded me-4" style="width: 100px; height: 100px;">
        <img
          [src]="getImageUrl(product.imageUrl) || 'assets/img/no-image.png'"
          class="img-fluid rounded"
          alt="{{ product.name }}"
        />
      </div>

      <div>
        <h6 class="mb-2">
          <a
            [routerLink]="['/storefront/product', product.slug]"
            class="text-dark text-decoration-none"
          >
            {{ product.name }}
          </a>
        </h6>

        <!-- Rating -->
        <div class="d-flex mb-2">
          <i
            *ngFor="let star of stars"
            class="fa fa-star"
            [class.text-secondary]="star <= rating"
          ></i>
        </div>

        <!-- Price -->
        <div class="d-flex mb-2">
          <h5 class="fw-bold me-2">
            ₱{{ product.price }}
          </h5>
        </div>
      </div>
    </div>

    <!-- View More -->
    <div class="d-flex justify-content-center my-4">
      <a
        routerLink="/storefront/shop"
        [queryParams]="{ page: 1, featured: true }"
        class="btn border border-secondary px-4 py-3 rounded-pill text-primary w-100"
      >
        View More
      </a>
    </div>
  </ng-container>
</div>
