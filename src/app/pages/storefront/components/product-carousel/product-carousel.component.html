<h2 *ngIf="title" class="fw-bold mb-4">
  {{ title }}
</h2>
<swiper-container
  slides-per-view="4"
  space-between="24"
  loop="true"
  navigation="true"
  breakpoints='{
    "0": { "slidesPerView": 1 },
    "576": { "slidesPerView": 2 },
    "992": { "slidesPerView": 3 },
    "1200": { "slidesPerView": 4 }
  }'
>
  <swiper-slide *ngFor="let product of items">
    <app-product-card [product]="product"></app-product-card>
  </swiper-slide>
</swiper-container>
