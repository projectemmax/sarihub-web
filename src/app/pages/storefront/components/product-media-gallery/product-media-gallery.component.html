<div class="product-image-container border rounded">
    <img
        [src]="getMainImageUrl(product)"
        class="img-fluid rounded"
        alt="{{ product.name }}"
    />
</div>
<div class="thumbnail-carousel">
    <button
        class="carousel-btn"
        (click)="scrollLeft()"
        [disabled]="!canScrollLeft">

        <i class="fas fa-chevron-left"></i>

    </button>
    <div
        #thumbnailContainer
        *ngIf="getProductThumbnails(product) as thumbnails"
        class="product-thumbnails"
        (scroll)="onThumbnailScroll()">
        <button
            *ngFor="let imageUrl of thumbnails"
            type="button"
            class="product-thumbnail"
            [class.active]="getMainImageUrl(product) === imageUrl"
            (click)="selectProductImage(imageUrl)">

            <img
                [src]="imageUrl"
                [alt]="product.name + ' thumbnail'">
                
        </button>
    </div>
    <button
        class="carousel-btn"
        (click)="scrollRight()"
        [disabled]="!canScrollRight">

        <i class="fas fa-chevron-right"></i>

    </button>
</div>
