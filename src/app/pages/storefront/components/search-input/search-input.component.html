<div class="input-group">
  <input
    type="text"
    class="form-control p-3"
    [placeholder]="placeholder"
    [formControl]="searchCtrl"
  />

  <!-- SINGLE clear button -->
  <button
    *ngIf="searchCtrl.value"
    class="btn btn-outline-secondary"
    type="button"
    (click)="clear()"
    aria-label="Clear search">
    <i class="fa fa-times"></i>
  </button>
</div>
