<div class="container py-5">
  <div class="row g-4">
    <div class="col-lg-3" *ngFor="let f of features">
      <div class="text-center p-4 bg-light rounded">
        <i class="fas {{ f.icon }} fa-3x text-primary mb-3"></i>
        <h5>{{ f.title }}</h5>
        <p>{{ f.desc }}</p>
      </div>
    </div>
  </div>
</div>
