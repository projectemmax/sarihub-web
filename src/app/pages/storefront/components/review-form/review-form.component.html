<form
  [formGroup]="form"
  (ngSubmit)="submit()"
  novalidate
>
  <h4 class="mb-5 fw-bold">Write a Review</h4>

  <div class="row g-4">

    <!-- COMMENT -->
    <div class="col-lg-12">
      <div class="border-bottom rounded my-4">
        <textarea
          class="form-control border-0"
          rows="6"
          placeholder="Your Review"
          spellcheck="false"
          formControlName="comment">
        </textarea>
      </div>
    </div>
    <!-- IMAGE UPLOAD -->
    <div class="col-lg-12">

      <label class="form-label fw-semibold">
        Upload photos (optional)
      </label>

      <input
        type="file"
        class="form-control"
        multiple
        accept="image/*"
        (change)="onFilesSelected($event)"
      />
      <small class="text-muted">
        You can upload up to 5 images
      </small>
    </div>
    <div *ngIf="previewUrls.length" class="d-flex gap-2 mt-3 flex-wrap">
      <div
        *ngFor="let img of previewUrls; let i = index"
        class="position-relative"
        style="width:80px"
      >

        <img
          [src]="img"
          class="img-thumbnail"
          style="width:80px;height:80px;object-fit:cover"
        />

        <button
          type="button"
          class="btn btn-sm btn-danger position-absolute"
          style="top:-6px;right:-6px;padding:0 6px"
          (click)="removeImage(i)">
          ×
        </button>

      </div>

    </div>

    <div *ngIf="uploading" class="upload-loader">
      <div class="spinner-border text-success mb-2"></div>

      <div class="progress" style="height:6px;">
        <div
          class="progress-bar"
          role="progressbar"
          [style.width.%]="uploadProgress">
        </div>
      </div>

      <small class="text-muted">
        Uploading images... {{ uploadProgress }}%
      </small>

    </div>

    <!-- RATING + SUBMIT -->
    <div class="col-lg-12">
      <div class="d-flex justify-content-between align-items-center py-3 mb-5">

        <!-- STAR INPUT -->
        <div class="d-flex align-items-center">
          <p class="mb-0 me-3">Please rate:</p>
          <app-star-input
            [value]="form.controls.rating.value || 0"
            (valueChange)="form.controls.rating.setValue($event)">
        </app-star-input>
        </div>
        <small
            *ngIf="form.get('rating')?.touched && form.get('rating')?.invalid"
            class="text-danger">
            Please select a rating.
        </small>
        <!-- SUBMIT -->
        <button
          type="submit"
          [disabled]="form.invalid || uploading"
          class="btn border border-secondary text-primary rounded-pill px-4 py-3">
          Post Comment
        </button>

      </div>
    </div>

  </div>
</form>
