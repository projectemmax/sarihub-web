<!-- Hero Start -->
<div 
    class="container-fluid hero-header py-5 mb-5"
    [ngStyle]="{
    'background-image': hero.background
      ? 'url(' + hero.background + ')'
      : 'url(/assets/storefront/hero/hero-medical-02.jpg)'
    }">
    <div class="container py-5 text-center">

        <!-- Tagline -->
        <h5 class="text-uppercase text-light mb-3">
        {{ hero.tagline }}
        </h5>

        <!-- Main Title -->
        <h1 class="display-4 fw-bold text-white mb-3">
        {{ hero.title }}
        </h1>

        <!-- Subtitle -->
        <p class="text-light mb-4">
        {{ hero.subtitle }}
        </p>

        <!-- Search -->
        <div class="position-relative mx-auto search-wrapper">

            <!-- INPUT -->
            <input
                class="form-control search-input"
                type="text"
                [(ngModel)]="searchTerm"
                (ngModelChange)="onInputChange($event)"
                (keyup.enter)="onSearch()"
            />

            <button
                type="button"
                [disabled]="!searchTerm.trim()"
                (click)="onSearch()"
                class="btn btn-primary search-btn"
            >
                Search
            </button>

            <!-- 🔥 AUTOCOMPLETE DROPDOWN -->
            <div *ngIf="showDropdown" class="autocomplete-dropdown">

                <!-- Suggestions -->
                <div
  *ngFor="let item of suggestions"
  class="autocomplete-item"
  (click)="selectSuggestion(item)"
>
  <img
    [src]="item.images?.[0]?.url || '/assets/no-image.png'"
    class="autocomplete-img"
  />

  <div class="autocomplete-info">
    <div class="autocomplete-name">
      {{ item.name }}
    </div>
    <div class="autocomplete-price">
      ₱{{ item.price }}
    </div>
  </div>
</div>

                <!-- 🔥 THIS IS WHAT YOU'RE ASKING -->
                <div
                    class="autocomplete-item search-all"
                    (click)="onSearch()">
                    🔍 Search for "{{ searchTerm }}"
                </div>

            </div>

        </div>

    </div>
</div>
<!-- Hero End -->
