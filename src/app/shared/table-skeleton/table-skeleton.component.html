<div class="table-skeleton-wrapper">
    <table class="table-skeleton">
        <!-- Header -->
        <thead *ngIf="showHeader">
            <tr>
                <th
                    *ngFor="let col of [].constructor(columns); let i = index"
                    [style.width]="columnWidths[i] || 'auto'">
                    <div class="skeleton shimmer header-cell"></div>
                </th>
            </tr>
        </thead>
        <!-- Body -->
        <tbody>
            <tr *ngFor="let row of rowArray">
                <td
                    *ngFor="let col of columnArray; let i = index"
                    [style.width]="columnWidths[i] || 'auto'">

                    <ng-container [ngSwitch]="variant">
                        <!-- Reviews -->
                        <ng-container *ngSwitchCase="'reviews'">
                            <div *ngIf="i === 0" class="skeleton shimmer checkbox"></div>
                            <div *ngIf="i !== 0" class="skeleton shimmer text"></div>
                        </ng-container>

                        <!-- Products -->
                        <ng-container *ngSwitchCase="'products'">
                            <div *ngIf="i === 0" class="skeleton shimmer image"></div>
                            <div *ngIf="i !== 0" class="skeleton shimmer text"></div>
                        </ng-container>

                        <!-- Orders -->
                        <ng-container *ngSwitchCase="'orders'">
                            <div class="skeleton shimmer text"></div>
                        </ng-container>

                        <!-- Default -->
                        <ng-container *ngSwitchDefault>
                            <div class="skeleton shimmer text"></div>
                        </ng-container>
                    </ng-container>
                </td>
                
            </tr>
        </tbody>
    </table>
</div>
