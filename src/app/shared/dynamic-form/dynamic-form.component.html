<form *ngIf="form" [formGroup]="form">

    <div *ngFor="let group of grouped | keyvalue" class="mb-4">
        <div class="card shadow-sm border-0">
            <!-- HEADER -->
            <div class="card-header d-flex justify-content-between align-items-center"
                (click)="toggle(group.key)"
                style="cursor:pointer">

                <div class="d-flex align-items-center gap-3">
                    <div class="icon-wrapper bg-primary text-white rounded-circle d-flex align-items-center justify-content-center icon-size">
                        <i [class]="schema.groupUI?.[group.key]?.icon"></i>
                    </div>

                    <div>
                        <h5 class="mb-0">{{ group.key }}</h5>
                        <small class="text-muted">
                        {{ schema.groupUI?.[group.key]?.subtitle }}
                        </small>
                    </div>
                </div>

                <i class="mdi"
                [ngClass]="collapsed[group.key] ? 'mdi-chevron-down' : 'mdi-chevron-up'">
                </i>
            </div>

            <!-- BODY -->
            <div class="card-body" *ngIf="!collapsed[group.key]">

                <div 
                    *ngFor="let field of group.value; trackBy: trackByField" 
                    class="mb-3">

                    <!-- BOOLEAN -->
                    <div *ngIf="field.type === 'boolean'" class="form-check form-switch">
                        <input type="checkbox" class="form-check-input" role="switch"
                            [formControlName]="normalizeKey(field.key)" />
                        <label class="form-check-label">{{ field.label }}</label>
                    </div>

                    <!-- TEXT -->
                    <div *ngIf="field.type === 'text'" class="form-group">
                        <label>{{ field.label }}</label>
                        <input class="form-control"
                            [formControlName]="normalizeKey(field.key)" />
                    </div>

                    <!-- TEXTAREA -->
                    <div *ngIf="field.type === 'textarea'" class="form-group">
                        <label>{{ field.label }}</label>

                        <textarea
                            class="form-control"
                            rows="4"
                            style="resize: vertical;"
                            [formControlName]="normalizeKey(field.key)"
                            [placeholder]="field.placeholder || ''">
                        </textarea>

                        <small *ngIf="field.help" class="text-muted d-block mt-1">
                            {{ field.help }}
                        </small>
                    </div>

                    <!-- SELECT -->
                    <div *ngIf="field.type === 'select'" class="form-group">
                        <label class="form-label">{{ field.label }}</label>
                        <select class="form-select form-control"
                                [formControlName]="normalizeKey(field.key)">
                            <option *ngFor="let opt of field.options" [value]="opt">
                                {{ opt }}
                            </option>
                        </select>
                    </div>

                    <!-- ARRAY -->
                    <div *ngIf="field.type === 'array'">
                        <label class="form-label">{{ field.label }}</label>

                        <!-- ============================= -->
                        <!-- 🟢 SIMPLE ARRAY (string[]) -->
                        <!-- ============================= -->
                        <ng-container *ngIf="!field.itemSchema">

                            <div 
                                [formArrayName]="normalizeKey(field.key)"
                                cdkDropList
                                (cdkDropListDropped)="drop(field.key, $event)"
                            >
                                <div
                                    *ngFor="let ctrl of getArray(field.key).controls; let i = index"
                                    class="d-flex mb-2 align-items-center"
                                    cdkDrag
                                >
                                    <span class="me-2 drag-handle" cdkDragHandle>☰</span>

                                    <input
                                    class="form-control me-2"
                                    [formControlName]="i"
                                    />

                                    <button
                                        type="button"
                                        class="btn btn-danger btn-sm"
                                        (click)="removeItem(field.key, i)"
                                    >
                                        ✕
                                    </button>
                                </div>
                            </div>

                            <button
                                type="button"
                                class="btn btn-outline-primary btn-sm"
                                (click)="addItem(field.key)"
                            >
                                + Add Item
                            </button>

                        </ng-container>

                        <!-- ============================= -->
                        <!-- 🔵 OBJECT ARRAY (shopOffers) -->
                        <!-- ============================= -->
                        <ng-container *ngIf="field.itemSchema">

                            <div 
                                [formArrayName]="normalizeKey(field.key)"
                                cdkDropList
                                (cdkDropListDropped)="drop(field.key, $event)"
                            >

                                <div
                                    *ngFor="let ctrl of getArray(field.key).controls; let i = index"
                                    [formGroupName]="i"
                                    class="card p-3 mb-3"
                                    cdkDrag
                                >

                                    <div class="d-flex justify-content-between align-items-center mb-2">

                                        <!-- DRAG HANDLE -->
                                        <span
                                            class="drag-handle"
                                            cdkDragHandle
                                            style="cursor: grab;"
                                        >
                                            ☰ Drag
                                        </span>

                                        <!-- REMOVE BUTTON -->
                                        <button
                                            type="button"
                                            class="btn btn-danger btn-sm"
                                            (click)="removeArrayItem(field.key, i)"
                                        >
                                            Remove
                                        </button>

                                    </div>


                                    <div *ngFor="let subField of field.itemSchema">

                                        <!-- IMAGE -->
                                        <div *ngIf="subField.type === 'image'" class="form-group">
                                            <label>{{ subField.label }}</label>
                                            
                                            <div class="image-preview mb-2">
                                                <img
                                                    *ngIf="ctrl.get(normalizeKey(subField.key))?.value"
                                                    [src]="ctrl.get(normalizeKey(subField.key))?.value"
                                                    class="w-100 h-150 object-fit-cover rounded"
                                                />
                                            </div>

                                            <button
                                                type="button"
                                                class="btn btn-primary btn-sm"
                                                (click)="openMediaPickerForArray(field, i, subField)"
                                            >
                                                Select Image
                                            </button>
                                        </div>

                                        <!-- TEXT -->
                                        <div *ngIf="subField.type === 'text'" class="form-group">
                                            <label class="form-label">{{ subField.label }}</label>

                                            <input
                                                class="form-control"
                                                [formControlName]="normalizeKey(subField.key)"
                                            />
                                        </div>

                                    </div>

                                    <button
                                        type="button"
                                        class="btn btn-danger btn-sm mt-2"
                                        (click)="removeArrayItem(field.key, i)"
                                    >
                                        Remove Item
                                    </button>

                                </div>

                            </div>

                            <button
                                type="button"
                                class="btn btn-outline-primary btn-sm"
                                (click)="addArrayItem(field)"
                            >
                                + Add Item
                            </button>

                        </ng-container>

                    </div>

                    <div *ngIf="field.type === 'number'" class="form-group mb-3">
                        <label>{{ field.label }}</label>

                        <div class="input-group">
                            <span class="input-group-text">₱</span>

                            <input
                                type="number"
                                min="0"
                                class="form-control"
                                [formControlName]="normalizeKey(field.key)"
                                [placeholder]="field.placeholder || ''"
                            />
                        </div>

                        <small *ngIf="field.help" class="text-muted d-block mt-1">
                            {{ field.help }}
                        </small>
                    </div>

                    <!-- IMAGE FIELD -->
                    <div *ngIf="field.type === 'image'" class="mb-4">

                        <label class="form-label fw-semibold">{{ field.label }}</label>

                        <!-- Preview -->
                        <div class="image-preview mb-2">
                            <img
                                *ngIf="getImagePreview(field.key)"
                                [src]="getImagePreview(field.key)"
                                class="w-100 h-150 object-fit-cover rounded"
                            />
                        </div>

                        <!-- Select Button -->
                        <button
                            type="button"
                            class="btn btn-primary btn-sm"
                            (click)="openMediaPicker(field)"
                        >
                            Select Image
                        </button>

                        <!-- Remove -->
                        <button
                            *ngIf="getImagePreview(field.key)"
                            type="button"
                            class="btn btn-danger btn-sm ms-2"
                            (click)="removeImage(field.key)"
                        >
                            Remove
                        </button>

                        
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- SAVE BUTTON -->
<div class="d-flex justify-content-between align-items-center mt-3">

  <!-- LEFT: STATUS -->
  <div>
    <small *ngIf="loading" class="text-muted">
      <span class="spinner-border spinner-border-sm me-1"></span>
      Saving...
    </small>

    <small *ngIf="!loading && !isDirty" class="text-success">
      ✔ All changes saved
    </small>

    <small *ngIf="isDirty && !loading" class="text-warning">
      Unsaved changes
    </small>
  </div>

  <!-- RIGHT: BUTTON -->
  <!-- <button 
    class="btn btn-primary px-4"
    [disabled]="isSubmitting"
  >
    <span *ngIf="!isSubmitting">
      <i class="mdi mdi-content-save"></i> Save
    </span>

    <span *ngIf="isSubmitting">
      <span class="spinner-border spinner-border-sm me-2"></span>
      Saving...
    </span>
  </button> -->

</div>

</form>

<div *ngIf="showMediaPicker" class="media-modal">

  <div class="media-modal-content">

    <!-- HEADER -->
    <div class="media-header">
      <h5>Select Image</h5>
      <button class="close-btn" (click)="closeMediaPicker()">✕</button>
    </div>

    <!-- BODY (just render component) -->
    <div class="media-body">
        <app-media-picker
            *ngIf="activeImageField || activeArrayField"
            [folder]="activeFolder"
            [usage]="activeUsage"
            (selected)="onMediaSelected($event)">
        </app-media-picker>
    </div>

  </div>

</div>
