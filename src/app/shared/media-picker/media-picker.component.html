<div class="media-wrapper">

    <!-- HEADER / TABS + UPLOAD -->
    <div class="media-toolbar">

        <!-- LEFT: Tabs -->
        <div 
            class="media-tabs"
            *ngIf="showFolders">
            <button
                class="tab-btn"
                [class.active]="currentFolder === 'products'"
                (click)="changeFolder('products')">
                Products
            </button>

            <button
                class="tab-btn"
                [class.active]="currentFolder === 'banner'"
                (click)="changeFolder('banner')">
                Banners
            </button>
            
            <button
                class="tab-btn"
                [class.active]="currentFolder === 'brands'"
                (click)="changeFolder('brands')">
                Brands
            </button>

        </div>

        <!-- RIGHT: Upload -->
        <div class="media-actions">
            <label class="upload-btn" [class.disabled]="isUploading">

            <span *ngIf="!isUploading">Upload</span>

            <span *ngIf="isUploading" class="spinner"></span>

            <input
                type="file"
                hidden
                (change)="onUpload($event)"
                [disabled]="isUploading"
            />

            </label>
        </div>

    </div>

    <div 
        class="d-flex gap-2 mb-3"
        *ngIf="showUsageFilters">
        <button
            class="btn btn-sm"
            [class.btn-primary]="currentUsage === 'all'"
            [class.btn-light]="currentUsage !== 'all'"
            (click)="changeUsage('all')"
        >
            All
        </button>

        <button
            class="btn btn-sm"
            [class.btn-primary]="currentUsage === 'hero'"
            [class.btn-light]="currentUsage !== 'hero'"
            (click)="changeUsage('hero')"
        >
            Hero
        </button>

        <button
            class="btn btn-sm"
            [class.btn-primary]="currentUsage === 'shop-offer'"
            [class.btn-light]="currentUsage !== 'shop-offer'"
            (click)="changeUsage('shop-offer')"
        >
            Shop Offers
        </button>
    </div>

    <!-- GRID -->
     <div class="media-grid-wrapper">
        <div class="media-grid">
            <div
                *ngFor="let m of media"
                class="media-item"
                [class.selected]="selectedId === m.id"
                (click)="pick(m)"
                >
                <img [src]="m.url" />

                <div class="media-overlay">
                    <button
                        class="delete-btn"
                        (click)="confirmDelete(m, $event)"
                        >
                        ✕
                    </button>
                </div>
            </div>
        </div>
     </div>
    

</div>

<div *ngIf="showDeleteModal" class="confirm-modal">

  <div class="confirm-box">
    <h5>Delete Image</h5>
    <p>Are you sure you want to delete this image?</p>

    <div class="actions">
      <button class="btn btn-danger" (click)="deleteConfirmed()">
        Delete
      </button>
      <button class="btn btn-secondary" (click)="showDeleteModal = false">
        Cancel
      </button>
    </div>
  </div>

</div>
