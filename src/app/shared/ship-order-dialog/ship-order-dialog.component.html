<h2 mat-dialog-title>Ship Order #{{ data.orderNumber }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()">
    <mat-dialog-content class="ship-dialog-content">
        <mat-form-field appearance="outline">
            <mat-label>Courier</mat-label>
            <mat-select formControlName="courierCode">
                <mat-option value="jnt">J&T Express</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Courier Name</mat-label>
            <input matInput formControlName="courierName">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Tracking Number</mat-label>
            <input matInput formControlName="trackingNumber" autocomplete="off">
            <mat-error *ngIf="form.controls.trackingNumber.hasError('required')">
                Tracking number is required.
            </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Shipping Method</mat-label>
            <mat-select formControlName="shippingMethod">
                <mat-option value="drop_off">Drop-off</mat-option>
                <mat-option value="pickup">Pick-up</mat-option>
            </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Shipping Fee</mat-label>
            <input matInput type="number" min="0" formControlName="shippingFee">
        </mat-form-field>

        <mat-form-field appearance="outline">
            <mat-label>Remarks</mat-label>
            <textarea matInput rows="3" formControlName="remarks"></textarea>
        </mat-form-field>
    </mat-dialog-content>

    <mat-dialog-actions align="end">
        <button mat-button type="button" mat-dialog-close>Cancel</button>
        <button mat-raised-button color="primary" type="submit">
            Confirm Shipment
        </button>
    </mat-dialog-actions>
</form>
