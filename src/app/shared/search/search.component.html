<div class="input-group">

  <input
    type="text"
    class="form-control"
    [placeholder]="placeholder"
    [value]="value"
    (input)="onInput($any($event.target).value)" />

  <button
    *ngIf="value"
    class="btn btn-outline-secondary"
    type="button"
    (click)="clear()">
    ✕
  </button>

</div>
